<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFK G2016 - Troppsoversikt 24. April</title>
    <style>
        :root {
            --mfk-blue: #00529b;
            --mfk-white: #ffffff;
            --keeper-green: #2e7d32;
            --label-bg: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background: #1b5e20; 
            background-image: linear-gradient(rgba(255,255,255,0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(255,255,255,0.05) 2px, transparent 2px);
            background-size: 80px 80px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px;
            gap: 25px;
            margin: 0;
        }

        h1 {
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .player-card {
            width: 260px;
            height: 420px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border-radius: 15px;
        }

        .player-card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            border: 4px solid white;
            overflow: hidden;
        }

        .card-front {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        .jersey-blue { background-color: var(--mfk-blue); }
        .jersey-keeper { background-color: var(--keeper-green); }

        .stripes {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 35px;
        }
        .stripe-group { display: flex; gap: 4px; }
        .stripe { width: 6px; height: 45px; background: white; }

        .collar {
            width: 90px;
            height: 30px;
            background: white;
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            z-index: 2;
        }

        .jersey-body {
            margin-top: 30px;
            text-align: center;
            width: 100%;
        }

        .fname { font-size: 1.4rem; text-transform: uppercase; margin-bottom: 5px; text-shadow: 1px 1px 2px #000; }
        .number { font-size: 8rem; line-height: 1; margin: 10px 0; font-family: 'Arial Black', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        .lname { 
            font-size: 1rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-family: 'Verdana', sans-serif;
            font-weight: bold;
            padding: 0 10px;
            text-shadow: 1px 1px 2px #000;
        }

        .role-badge {
            margin-top: 15px;
            background: var(--label-bg);
            color: #ffeb3b;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card-back {
            background: #fdfdfd;
            color: #333;
            transform: rotateY(180deg);
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            font-family: 'Arial', sans-serif;
        }

        .card-back h2 { color: var(--mfk-blue); border-bottom: 3px solid var(--mfk-blue); font-size: 1.2rem; margin-top: 0; padding-bottom: 10px; }
        .info-bit { margin: 12px 0; font-size: 0.9rem; }
        .info-label { font-weight: bold; color: #555; display: block; text-transform: uppercase; font-size: 0.7rem; margin-bottom: 3px; }
        .comment-box { background: #f0f0f0; padding: 10px; border-left: 4px solid var(--mfk-blue); font-style: italic; font-size: 0.85rem; margin-top: auto; }
    </style>
</head>
<body>

    <h1>MFK G2016 Spillerstall</h1>

    <div id="grid" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 25px;"></div>

    <script>
        const players = [
            { f: "Adrian", e: "Austnes-Eliassen", s: "M", n: "23", type: "blue" },
            { f: "André", e: "Arbildo-Tverfjell", s: "S", n: "17", type: "blue" },
            { f: "Anton", e: "Holbø", s: "S", n: "7", type: "blue" },
            { f: "Aslak", e: "Thomassen", s: "L", n: "8", type: "blue" },
            { f: "Daniel", e: "Kebede", s: "M", n: "95", type: "blue" },
            { f: "Elirone", e: "Nkamicaniye", s: "M", n: "19", type: "blue", c: "Mangler shorts str. M" },
            { f: "Filip Nathaniel", e: "Bjerkelund-Hustad", s: "S", n: "9", type: "blue" },
            { f: "Frosti", e: "Birnisson", s: "L", n: "28", type: "blue" },
            { f: "Herman", e: "Larsen Varhaugvik", s: "S", n: "11", type: "blue" },
            { f: "Isak", e: "Eidslott Virum", s: "S", n: "46", type: "blue" },
            { f: "Jesper", e: "Post", s: "S", n: "30", type: "blue" },
            { f: "Jesper", e: "Stranden Rikstad", s: "L", n: "39", type: "blue" },
            { f: "Johannes", e: "Wolff Bringslid", s: "M", n: "13", type: "blue" },
            { f: "Jonah", e: "Post", s: "S", n: "12", type: "keeper", role: "KEEPER" },
            { f: "Jonah", e: "Post", s: "S", n: "34", type: "blue", role: "UTESPILLER" },
            { f: "Joud", e: "Abdulsamei", s: "S", n: "55", type: "blue" },
            { f: "Kasper M", e: "Sylte", s: "M", n: "3", type: "blue", c: "Trenger shorts L" },
            { f: "Kenneth", e: "Weng Kleve", s: "M", n: "22", type: "blue" },
            { f: "Kim Stian", e: "Vestad", s: "M", n: "29", type: "blue" },
            { f: "Knut", e: "Rød", s: "S", n: "2", type: "blue" },
            { f: "Linus", e: "Haukaas-Øverland", s: "S", n: "26", type: "blue" },
            { f: "Markus", e: "Heien Vik", s: "S", n: "37", type: "blue" },
            { f: "Mathias", e: "Ilestad Håbet", s: "M", n: "21", type: "blue" },
            { f: "Mats", e: "Roksvaag Aakvik", s: "S", n: "1", type: "keeper", role: "KEEPER" },
            { f: "Mats", e: "Roksvaag Aakvik", s: "S", n: "52", type: "blue", role: "UTESPILLER" },
            { f: "Ola", e: "Helset Myklebust", s: "M", n: "20", type: "blue" },
            { f: "Oleander", e: "Sundgot", s: "S", n: "49", type: "blue" },
            { f: "Oskar", e: "Veiåker", s: "M", n: "14", type: "blue" },
            { f: "Peter", e: "Hovde", s: "XXL", n: "30", type: "blue" },
            { f: "Sander", e: "Jørgensen", s: "M", n: "1", type: "keeper", role: "KEEPER" },
            { f: "Sander", e: "Jørgensen", s: "M", n: "38", type: "blue", role: "UTESPILLER" },
            { f: "Sebastian", e: "Vetvik", s: "M", n: "31", type: "blue", c: "Må levere drakt tilbake" },
            { f: "Sondre", e: "Fjærestad Fostervold", s: "S", n: "16", type: "blue" },
            { f: "Theo", e: "Grüner Bygland", s: "M", n: "35", type: "blue" },
            { f: "Theodor", e: "Haukebø", s: "L", n: "54", type: "blue" },
            { f: "Vegard", e: "Gjerde", s: "M", n: "27", type: "blue" }
        ];

        const grid = document.getElementById('grid');

        players.forEach(p => {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.onclick = () => card.classList.toggle('is-flipped');

            const jerseyClass = p.type === 'keeper' ? 'jersey-keeper' : 'jersey-blue';

            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front ${jerseyClass}">
                        <div class="stripes">
                            <div class="stripe-group"><div class="stripe"></div><div class="stripe"></div><div class="stripe"></div></div>
                            <div class="stripe-group"><div class="stripe"></div><div class="stripe"></div><div class="stripe"></div></div>
                        </div>
                        <div class="collar"></div>
                        <div class="jersey-body">
                            <div class="fname">${p.f}</div>
                            <div class="number">${p.n}</div>
                            <div class="lname">${p.e}</div>
                            ${p.role ? `<div class="role-badge">${p.role}</div>` : ''}
                        </div>
                    </div>
                    <div class="card-back">
                        <h2>${p.f} ${p.e}</h2>
                        <div class="info-bit">
                            <span class="info-label">Draktstørrelse</span>
                            <b>${p.s}</b>
                        </div>
                        <div class="info-bit">
                            <span class="info-label">Status</span>
                            <b>#${p.n} ${p.role ? '(' + p.role.toLowerCase() + ')' : 'utespiller'}</b>
                        </div>
                        <div class="comment-box">
                            ${p.c || 'Ingen merknader registrert.'}
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
