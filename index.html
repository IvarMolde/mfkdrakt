<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFK G2016 - Troppsoversikt</title>
    <style>
        :root {
            --mfk-blue: #00529b;
            --mfk-white: #ffffff;
            --no-number-yellow: #ffd700;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background: #2e7d32; 
            background-image: linear-gradient(rgba(255,255,255,0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(255,255,255,0.05) 2px, transparent 2px);
            background-size: 80px 80px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px;
            gap: 25px;
            margin: 0;
        }

        h1 {
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .player-card {
            width: 260px;
            height: 400px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border-radius: 15px;
        }

        .player-card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            border: 4px solid white;
            overflow: hidden;
        }

        /* FORSIDE DESIGN */
        .card-front {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        .status-ready { background-color: var(--mfk-blue); }
        .status-missing { background-color: var(--no-number-yellow); color: #000 !important; border-color: #000; }

        .stripes {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 35px;
        }
        .stripe-group { display: flex; gap: 4px; }
        .stripe { width: 6px; height: 45px; background: white; }
        .status-missing .stripe { background: #000; }

        .collar {
            width: 90px;
            height: 30px;
            background: white;
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            z-index: 2;
        }
        .status-missing .collar { background: #000; }

        .jersey-body {
            margin-top: 30px;
            text-align: center;
            width: 100%;
        }

        .fname { font-size: 1.5rem; text-transform: uppercase; margin-bottom: 5px; }
        .number { font-size: 8.5rem; line-height: 1; margin: 10px 0; font-family: 'Arial Black', sans-serif; }
        .lname { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; }

        /* BAKSIDE DESIGN */
        .card-back {
            background: #fdfdfd;
            color: #333;
            transform: rotateY(180deg);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            font-family: 'Arial', sans-serif;
        }

        .card-back h2 { color: var(--mfk-blue); border-bottom: 2px solid var(--mfk-blue); font-size: 1.2rem; margin-top: 0; }
        .info-bit { margin: 10px 0; font-size: 0.9rem; }
        .info-label { font-weight: bold; color: #777; display: block; text-transform: uppercase; font-size: 0.7rem; }
        .comment-area { background: #eee; padding: 10px; border-radius: 5px; font-style: italic; flex-grow: 1; margin-top: 10px; border-left: 4px solid var(--mfk-blue); }
    </style>
</head>
<body>

            const card = document.createElement('div');

            card.innerHTML = `

                    </div>

            grid.appendChild(card);
        });
    </script>
</body>
</html>
