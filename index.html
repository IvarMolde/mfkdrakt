<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFK G2016 - Troppsoversikt 24. April (V2)</title>
    <style>
        :root {
            --mfk-blue: #00529b;
            --mfk-white: #ffffff;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background: #2e7d32; 
            background-image: linear-gradient(rgba(255,255,255,0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(255,255,255,0.05) 2px, transparent 2px);
            background-size: 80px 80px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 40px;
            gap: 25px;
            margin: 0;
        }

        h1 {
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .player-card {
            width: 260px;
            height: 400px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border-radius: 15px;
        }

        .player-card.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            border: 4px solid white;
            overflow: hidden;
        }

        .card-front {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            background-color: var(--mfk-blue);
        }

        .stripes {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 35px;
        }
        .stripe-group { display: flex; gap: 4px; }
        .stripe { width: 6px; height: 45px; background: white; }

        .collar {
            width: 90px;
            height: 30px;
            background: white;
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            z-index: 2;
        }

        .jersey-body {
            margin-top: 30px;
            text-align: center;
            width: 100%;
        }

        .fname { font-size: 1.4rem; text-transform: uppercase; margin-bottom: 5px; padding: 0 10px; }
        .number { font-size: 8rem; line-height: 1; margin: 10px 0; font-family: 'Arial Black', sans-serif; }
        
        .lname { 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-family: 'Verdana', sans-serif;
            font-weight: bold;
            padding: 0 10px;
        }

        .card-back {
            background: #fdfdfd;
            color: #333;
            transform: rotateY(180deg);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            font-family: 'Arial', sans-serif;
        }

        .card-back h2 { color: var(--mfk-blue); border-bottom: 2px solid var(--mfk-blue); font-size: 1.2rem; margin-top: 0; }
        .info-bit { margin: 10px 0; font-size: 0.9rem; }
        .info-label { font-weight: bold; color: #777; display: block; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>

    <h1>MFK G2016 Troppsoversikt</h1>

    <div id="grid" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 25px;"></div>

    <script>
        const players = [

            { f: "André", e: "Arbildo-Tverfjell", s: "S", n: "17" },
            { f: "Anton", e: "Holbø", s: "S", n: "7" },
            { f: "Aslak", e: "Thomassen", s: "L", n: "8" },
            { f: "Daniel", e: "Kebede", s: "M", n: "95" },
            { f: "Elirone", e: "Nkamicaniye", s: "M", n: "19" },
            { f: "Filip Nathaniel", e: "Bjerkelund-Hustad", s: "S", n: "9" },
            { f: "Frosti", e: "Birnisson", s: "L", n: "28" },
            { f: "Herman", e: "Larsen Varhaugvik", s: "S", n: "11" },
            { f: "Isak", e: "Eidslott Virum", s: "S", n: "46" },
            { f: "Jesper", e: "Post", s: "S", n: "30" },
            { f: "Jesper", e: "Stranden Rikstad", s: "L", n: "39" },
            { f: "Johannes", e: "Wolff Bringslid", s: "M", n: "13" },
            { f: "Jonah", e: "Post (keeper)", s: "S", n: "12" },
            { f: "Jonah", e: "Post", s: "S", n: "34" },
            { f: "Joud", e: "Abdulsamei", s: "S", n: "55" },
            { f: "Kasper M", e: "Sylte", s: "M", n: "3" },
            { f: "Kenneth", e: "Weng Kleve", s: "M", n: "22" },
            { f: "Kim Stian", e: "Vestad", s: "M", n: "29" },

            { f: "Linus", e: "Haukaas-Øverland", s: "S", n: "26" },
            { f: "Markus", e: "Heien Vik", s: "S", n: "37" },
            { f: "Mathias", e: "Ilestad Håbet", s: "M", n: "21" },
            { f: "Mats", e: "Roksvaag Aakvik", s: "S", n: "52" },
            { f: "Ola", e: "Helset Myklebust", s: "M", n: "20" },
            { f: "Oleander", e: "Sundgot", s: "S", n: "49" },
            { f: "Oskar", e: "Veiåker", s: "M", n: "14" },
            { f: "Peter", e: "Hovde", s: "XXL", n: "30" },
            { f: "Sander", e: "Jørgensen", s: "M", n: "1" },
            { f: "Sander", e: "Jørgensen (utespiller)", s: "L", n: "?" },
            { f: "Sondre", e: "Fjærestad Fostervold", s: "S", n: "16" },
            { f: "Theo", e: "Grüner Bygland", s: "M", n: "35" },
            { f: "Theodor", e: "Haukebø", s: "L", n: "54" },
            { f: "Vegard", e: "Gjerde", s: "M", n: "27" }
        ];

        const grid = document.getElementById('grid');

        players.forEach(p => {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.onclick = () => card.classList.toggle('is-flipped');

            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">
                        <div class="stripes">
                            <div class="stripe-group"><div class="stripe"></div><div class="stripe"></div><div class="stripe"></div></div>
                            <div class="stripe-group"><div class="stripe"></div><div class="stripe"></div><div class="stripe"></div></div>
                        </div>
                        <div class="collar"></div>
                        <div class="jersey-body">
                            <div class="fname">${p.f}</div>
                            <div class="number">${p.n}</div>
                            <div class="lname">${p.e}</div>
                        </div>
                    </div>
                    <div class="card-back">
                        <h2>${p.f} ${p.e}</h2>
                        <div class="info-bit">
                            <span class="info-label">Draktstørrelse</span>
                            <b>${p.s}</b>
                        </div>
                        <div class="info-bit">
                            <span class="info-label">Status</span>
                            <b>${p.n !== "?" ? "Drakt utlevert (#" + p.n + ")" : "Venter på nummer"}</b>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
